AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SPV DataOps Challenge - functional demo stack (SAM)

Parameters:
  RawBucketName:
    Type: String
  CuratedBucketName:
    Type: String
  ScheduleExpression:
    Type: String
    Default: rate(15 minutes)
  GeminiApiKey:
    Type: String
    NoEcho: true

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 512
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        RAW_BUCKET: !Ref RawBucketName
        CURATED_BUCKET: !Ref CuratedBucketName
        GEMINI_API_KEY: !Ref GeminiApiKey
        OPENROUTER_API_KEY: !Ref GeminiApiKey
        OPENROUTER_MODEL: google/gemma-3-4b-it:free

Resources:
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref RawBucketName
      VersioningConfiguration:
        Status: Enabled

  CuratedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref CuratedBucketName
      VersioningConfiguration:
        Status: Enabled

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-operational-serving"
      CodeUri: ../../
      Handler: src.aws.serving_lambda.handler
      Timeout: 30
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref CuratedBucketName
      Environment:
        Variables:
          GOLD_KEY: gold/weather_operational_mart.json
      Events:
        Latest:
          Type: HttpApi
          Properties:
            Path: /latest
            Method: GET
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET

  PipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-pipeline"
      CodeUri: ../../
      Handler: src.aws.publisher_lambda.handler
      Policies:
        - S3WritePolicy:
            BucketName: !Ref RawBucketName
        - S3WritePolicy:
            BucketName: !Ref CuratedBucketName
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Ref ScheduleExpression

Outputs:
  HttpApiEndpoint:
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  RawBucketOutput:
    Value: !Ref RawBucket
  CuratedBucketOutput:
    Value: !Ref CuratedBucket
